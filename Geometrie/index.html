<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBR Training: Flächen- & Körperberechnungen</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- KaTeX for Math Rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

  <style>
    body {
      background-color: #f3f4f6;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .math-container {
      font-size: 1.15rem;
    }

    /* Druck-Optimierung: Versteckt Buttons und formatiert für DIN A4 Papier */
    @media print {
      body {
        background-color: white;
        padding: 0;
        margin: 0;
      }

      .no-print {
        display: none !important;
      }

      .print-border {
        border: none !important;
        box-shadow: none !important;
      }

      .print-break {
        page-break-inside: avoid;
      }

      .question-box {
        border: 1px solid #ccc !important;
        margin-bottom: 1rem !important;
        padding: 1rem !important;
      }

      input[type="text"],
      input[type="number"] {
        border: none !important;
        border-bottom: 1px dotted #000 !important;
        border-radius: 0 !important;
        background: transparent !important;
        box-shadow: none !important;
      }

      svg {
        page-break-inside: avoid;
        overflow: visible !important;
      }
    }
  </style>
</head>

<body class="text-gray-800 min-h-screen p-4 md:p-8">

  <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl print-border overflow-hidden pb-8">
    <!-- Header -->
    <div class="bg-teal-600 text-white p-6 text-center print-border no-print">
      <h1 class="text-3xl font-bold mb-2">BBR Training: Flächen & Körper</h1>
      <p class="text-teal-100 text-lg">Umfang, Flächeninhalt, Volumen, Oberfläche & Rückwärtsrechnen</p>
    </div>

    <!-- Print Header (Nur sichtbar auf dem Ausdruck) -->
    <div class="hidden print:block p-6 border-b-2 border-gray-800 mb-4">
      <div class="flex justify-between items-end">
        <h1 class="text-2xl font-bold">Aufgabenblatt: Flächen & Körperberechnungen</h1>
        <div class="text-right">
          <p>Name: _______________________</p>
          <p class="mt-2">Datum: _______________________</p>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="p-4 bg-gray-50 border-b border-gray-200 flex flex-wrap gap-4 justify-between items-center no-print">
      <p class="text-sm text-gray-600"><strong>Wichtig:</strong> Runde bei Kreis und Zylinder auf 2 Nachkommastellen
        (nutze $\pi$ oder 3,14).</p>
      <div class="flex gap-3">
        <button onclick="window.print()"
          class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg shadow transition font-medium flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M5 4v3H4a2 2 0 00-2 2v3a2 2 0 002 2h1v2a2 2 0 002 2h6a2 2 0 002-2v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a2 2 0 00-2-2H7a2 2 0 00-2 2zm8 0H7v3h6V4zm0 8H7v4h6v-4z"
              clip-rule="evenodd" />
          </svg>
          Drucken
        </button>
        <button onclick="generateWorksheet()"
          class="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-lg shadow transition font-medium">
          Neues Blatt generieren
        </button>
      </div>
    </div>

    <!-- App Content -->
    <div class="p-6">
      <div id="worksheet-container" class="space-y-6">
        <!-- Generierte Aufgaben landen hier -->
      </div>

      <!-- Global Actions -->
      <div class="mt-10 pt-6 border-t border-gray-200 flex flex-col items-center gap-4 no-print">
        <button id="btn-check-all" onclick="checkAllAnswers()"
          class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition transform hover:scale-105 text-lg">
          Verbleibende Antworten auswerten
        </button>
        <div id="final-score" class="text-2xl font-bold hidden mt-2"></div>
      </div>
    </div>
  </div>

  <script>
    // --- HILFSFUNKTIONEN ---
    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getUniqueLetters(count) {
      const letters = ['p', 'q', 'x', 'y', 'z', 'u', 'v', 'w', 'k', 'm', 'n', 's', 't'];
      let shuffled = letters.sort(() => 0.5 - Math.random());
      return shuffled.slice(0, count);
    }

    function round(num) {
      return Math.round(num * 100) / 100;
    }

    // --- AUFGABEN-GENERATOREN (FLÄCHEN) ---

    // 1. Trapez Fläche
    function genTrapez() {
      let top = getRandomInt(3, 8);
      let bottom = top + getRandomInt(2, 6);
      let height = getRandomInt(3, 9);
      let letters = getUniqueLetters(3);
      let ans = ((top + bottom) / 2) * height;

      let html = `
                <svg width="240" height="140" viewBox="0 0 240 140" class="mt-4 print-break">
                    <polygon points="60,30 160,30 200,110 30,110" fill="#ccfbf1" stroke="#0f766e" stroke-width="3" stroke-linejoin="round"/>
                    <line x1="60" y1="30" x2="60" y2="110" stroke="#0f766e" stroke-width="2" stroke-dasharray="5,5"/>
                    <rect x="60" y="95" width="15" height="15" fill="transparent" stroke="#0f766e" stroke-width="1.5"/>
                    
                    <text x="110" y="20" font-family="sans-serif" font-size="14" text-anchor="middle">${letters[0]} = ${top}</text>
                    <text x="115" y="130" font-family="sans-serif" font-size="14" text-anchor="middle">${letters[1]} = ${bottom}</text>
                    <text x="45" y="75" font-family="sans-serif" font-size="14" text-anchor="end">${letters[2]} = ${height}</text>
                </svg>
            `;
      return {
        topic: 'Flächen (Trapez)',
        text: 'Berechne den Flächeninhalt $A$ der abgebildeten Figur.',
        customHtml: html,
        answer: ans,
        unit: 'cm²'
      };
    }

    // 2. Zusammengesetzte Fläche (Wand mit Fenster)
    function genWand() {
      let outerW = getRandomInt(6, 12);
      let outerH = getRandomInt(4, 7);
      let innerW = getRandomInt(1, 3);
      let innerH = getRandomInt(1, 2);
      let letters = getUniqueLetters(4);
      let ans = (outerW * outerH) - (innerW * innerH);

      let html = `
                <svg width="280" height="160" viewBox="0 0 280 160" class="mt-4 print-break">
                    <!-- Outer -->
                    <rect x="40" y="30" width="200" height="100" fill="#e5e7eb" stroke="#374151" stroke-width="3"/>
                    <!-- Inner (Hole) -->
                    <rect x="150" y="50" width="40" height="30" fill="#ffffff" stroke="#374151" stroke-width="2"/>
                    
                    <text x="140" y="20" font-family="sans-serif" font-size="14" text-anchor="middle">${letters[0]} = ${outerW}</text>
                    <text x="30" y="85" font-family="sans-serif" font-size="14" text-anchor="end">${letters[1]} = ${outerH}</text>
                    
                    <text x="170" y="42" font-family="sans-serif" font-size="12" text-anchor="middle">${letters[2]} = ${innerW}</text>
                    <text x="195" y="70" font-family="sans-serif" font-size="12" text-anchor="start">${letters[3]} = ${innerH}</text>
                </svg>
            `;
      return {
        topic: 'Zusammengesetzte Flächen',
        text: 'Berechne die grau markierte Fläche $A$. Die weiße rechteckige Fläche ist eine Aussparung (Loch).',
        customHtml: html,
        answer: ans,
        unit: 'm²'
      };
    }

    // 3. Kreis (Fläche, Radius oder Durchmesser gegeben)
    function genKreis() {
      let val = getRandomInt(4, 15);
      let isDiameter = Math.random() > 0.5;
      let radius = isDiameter ? val / 2 : val;
      let ans = round(Math.PI * radius * radius);
      let letters = getUniqueLetters(1);

      let html = `
                <svg width="200" height="160" viewBox="0 0 200 160" class="mt-4 print-break">
                    <circle cx="100" cy="80" r="60" fill="#fef08a" stroke="#ca8a04" stroke-width="3"/>
                    <circle cx="100" cy="80" r="3" fill="#ca8a04"/>
                    ${isDiameter
          ? `<line x1="40" y1="80" x2="160" y2="80" stroke="#ca8a04" stroke-width="2" stroke-dasharray="4,4"/>
                           <text x="100" y="70" font-family="sans-serif" font-size="14" text-anchor="middle">${letters[0]} = ${val}</text>`
          : `<line x1="100" y1="80" x2="160" y2="80" stroke="#ca8a04" stroke-width="2" stroke-dasharray="4,4"/>
                           <text x="130" y="70" font-family="sans-serif" font-size="14" text-anchor="middle">${letters[0]} = ${val}</text>`
        }
                </svg>
            `;
      return {
        topic: 'Kreis',
        text: 'Berechne den Flächeninhalt $A$ des Kreises.',
        customHtml: html,
        answer: ans,
        unit: 'cm²'
      };
    }

    // --- AUFGABEN-GENERATOREN (KÖRPER) ---

    // 4. Quader (Oberfläche)
    function genQuader() {
      let u = getRandomInt(4, 10);
      let v = getRandomInt(3, 8);
      let w = getRandomInt(2, 6);
      let letters = getUniqueLetters(3);
      let ans = 2 * (u * v + u * w + v * w);

      let html = `
                <svg width="240" height="180" viewBox="0 0 240 180" class="mt-4 print-break">
                    <!-- Back faces -->
                    <polygon points="90,40 210,40 210,100 90,100" fill="none" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4,4"/>
                    <line x1="50" y1="140" x2="90" y2="100" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4,4"/>
                    <!-- Visible faces -->
                    <polygon points="50,80 170,80 210,40 90,40" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
                    <polygon points="170,80 210,40 210,100 170,140" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
                    <polygon points="50,80 170,80 170,140 50,140" fill="#93c5fd" stroke="#2563eb" stroke-width="2"/>
                    
                    <text x="110" y="160" font-family="sans-serif" font-size="14" text-anchor="middle">${letters[0]} = ${u}</text>
                    <text x="195" y="155" font-family="sans-serif" font-size="14" text-anchor="start">${letters[1]} = ${v}</text>
                    <text x="35" y="115" font-family="sans-serif" font-size="14" text-anchor="end">${letters[2]} = ${w}</text>
                </svg>
            `;
      return {
        topic: 'Körper (Quader)',
        text: 'Berechne die **Oberfläche** $O$ (die gesamte äußere Hülle) dieses Quaders.',
        customHtml: html,
        answer: ans,
        unit: 'cm²'
      };
    }

    // 5. Zylinder (Rückwärtsrechnen: Volumen gegeben, Höhe gesucht)
    function genZylinderRueck() {
      let r = getRandomInt(2, 5);
      let h = getRandomInt(3, 8);
      let v = round(Math.PI * r * r * h); // Wir geben ein realistisches, gerundetes Volumen vor
      let letters = getUniqueLetters(2);

      let html = `
                <svg width="220" height="180" viewBox="0 0 220 180" class="mt-4 print-break">
                    <!-- Top -->
                    <ellipse cx="110" cy="40" rx="60" ry="15" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
                    <line x1="110" y1="40" x2="170" y2="40" stroke="#4f46e5" stroke-width="2" stroke-dasharray="4,4"/>
                    <!-- Body -->
                    <path d="M 50 40 L 50 140 A 60 15 0 0 0 170 140 L 170 40" fill="#c7d2fe" stroke="#4f46e5" stroke-width="2"/>
                    <ellipse cx="110" cy="140" rx="60" ry="15" fill="none" stroke="#4f46e5" stroke-width="2" stroke-dasharray="4,4"/>
                    <circle cx="110" cy="40" r="2" fill="#4f46e5"/>
                    
                    <text x="140" y="32" font-family="sans-serif" font-size="14" text-anchor="middle">${letters[0]} = ${r}</text>
                    <text x="35" y="95" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="end">${letters[1]} = ?</text>
                    <text x="110" y="105" font-family="sans-serif" font-size="16" font-weight="bold" fill="#312e81" text-anchor="middle">V = ${v}</text>
                </svg>
            `;
      return {
        topic: 'Körper (Rückwärtsrechnen)',
        text: `Ein zylinderförmiges Gefäß fasst ein Volumen von $V = ${v}$. Berechne die fehlende Körperhöhe $${letters[1]}$.`,
        customHtml: html,
        answer: h, // The exact integer is expected because we built it that way
        unit: 'cm'
      };
    }

    // 6. Pyramide (Pythagoras -> Mantelfläche)
    function genPyramideMantel() {
      // Pythagoreische Tripel für a/2, h_k, h_s
      const scenarios = [
        { a: 6, hk: 4, hs: 5 },
        { a: 10, hk: 12, hs: 13 },
        { a: 16, hk: 15, hs: 17 }
      ];
      const t = scenarios[Math.floor(Math.random() * scenarios.length)];
      let letters = getUniqueLetters(2);
      let ans = 4 * ((t.a * t.hs) / 2); // 4 Dreiecke

      let html = `
                <svg width="240" height="200" viewBox="0 0 240 200" class="mt-4 print-break">
                    <!-- Base (dashed back) -->
                    <polygon points="50,150 170,150 200,110 80,110" fill="#fef2f2" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,4"/>
                    <!-- Height & hs (internal triangle) -->
                    <line x1="125" y1="130" x2="125" y2="30" stroke="#dc2626" stroke-width="3" stroke-dasharray="5,5"/>
                    <line x1="125" y1="130" x2="185" y2="130" stroke="#dc2626" stroke-width="2" stroke-dasharray="3,3"/>
                    <line x1="125" y1="30" x2="185" y2="130" stroke="#16a34a" stroke-width="3"/> <!-- hs -->
                    
                    <!-- Front Faces -->
                    <polygon points="50,150 170,150 125,30" fill="#fee2e2" fill-opacity="0.8" stroke="#dc2626" stroke-width="2"/>
                    <polygon points="170,150 200,110 125,30" fill="#fca5a5" fill-opacity="0.8" stroke="#dc2626" stroke-width="2"/>
                    
                    <text x="110" y="170" font-family="sans-serif" font-size="14" text-anchor="middle">${letters[0]} = ${t.a}</text>
                    <text x="115" y="80" font-family="sans-serif" font-size="14" text-anchor="end">${letters[1]} = ${t.hk}</text>
                    
                    <text x="175" y="85" font-family="sans-serif" font-size="12" fill="#16a34a" text-anchor="start">Seitenhöhe = ?</text>
                </svg>
            `;
      return {
        topic: 'Körper & Pythagoras',
        text: `Gegeben ist eine Pyramide mit **quadratischer** Grundfläche. <br>1. Berechne zuerst mit dem Satz des Pythagoras die grüne Seitenhöhe. <br>2. Berechne dann die **Mantelfläche** $M$ (alle 4 seitlichen Dreiecke zusammen).`,
        customHtml: html,
        answer: ans,
        unit: 'cm²'
      };
    }

    // 7. Kegel oder Kugel (Zufall)
    function genKegelOderKugel() {
      let isKegel = Math.random() > 0.5;
      let letters = getUniqueLetters(2);

      if (isKegel) {
        let r = getRandomInt(3, 8);
        let h = getRandomInt(5, 12);
        let ans = round((Math.PI * r * r * h) / 3);
        let html = `
                    <svg width="200" height="200" viewBox="0 0 200 200" class="mt-4 print-break">
                        <ellipse cx="100" cy="160" rx="60" ry="15" fill="#fdf4ff" stroke="#c026d3" stroke-width="2"/>
                        <path d="M 40 160 L 100 30 L 160 160" fill="#fae8ff" stroke="#c026d3" stroke-width="2"/>
                        <line x1="100" y1="160" x2="160" y2="160" stroke="#c026d3" stroke-width="2" stroke-dasharray="4,4"/>
                        <line x1="100" y1="30" x2="100" y2="160" stroke="#c026d3" stroke-width="2" stroke-dasharray="4,4"/>
                        <circle cx="100" cy="160" r="2" fill="#c026d3"/>
                        
                        <text x="130" y="152" font-family="sans-serif" font-size="14" text-anchor="middle">${letters[0]} = ${r}</text>
                        <text x="90" y="100" font-family="sans-serif" font-size="14" text-anchor="end">${letters[1]} = ${h}</text>
                    </svg>
                `;
        return {
          topic: 'Körper (Kegel)',
          text: 'Berechne das **Volumen** $V$ des spitzen Kegels.',
          customHtml: html,
          answer: ans,
          unit: 'cm³'
        };
      } else {
        let r = getRandomInt(4, 12);
        let ans = round((4 / 3) * Math.PI * Math.pow(r, 3));
        let html = `
                    <svg width="200" height="200" viewBox="0 0 200 200" class="mt-4 print-break">
                        <circle cx="100" cy="100" r="70" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
                        <ellipse cx="100" cy="100" rx="70" ry="20" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,4"/>
                        <path d="M 30 100 A 70 20 0 0 0 170 100" fill="none" stroke="#7c3aed" stroke-width="2"/>
                        <line x1="100" y1="100" x2="160" y2="70" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,4"/>
                        <circle cx="100" cy="100" r="2" fill="#7c3aed"/>
                        
                        <text x="120" y="80" font-family="sans-serif" font-size="14" text-anchor="end">${letters[0]} = ${r}</text>
                    </svg>
                `;
        return {
          topic: 'Körper (Kugel)',
          text: 'Berechne das **Volumen** $V$ der Kugel.',
          customHtml: html,
          answer: ans,
          unit: 'cm³'
        };
      }
    }

    // 8. Allgemeines Dreieck (Fläche)
    function genDreieck() {
      let base = getRandomInt(5, 15);
      let height = getRandomInt(4, 10);
      let ans = (base * height) / 2;
      let letters = getUniqueLetters(2);

      let html = `
                <svg width="220" height="150" viewBox="0 0 220 150" class="mt-4 print-break">
                    <polygon points="30,120 190,120 130,30" fill="#ecfdf5" stroke="#059669" stroke-width="3" stroke-linejoin="round"/>
                    <line x1="130" y1="30" x2="130" y2="120" stroke="#059669" stroke-width="2" stroke-dasharray="4,4"/>
                    <rect x="115" y="105" width="15" height="15" fill="transparent" stroke="#059669" stroke-width="1.5"/>
                    
                    <text x="110" y="140" font-family="sans-serif" font-size="14" text-anchor="middle">${letters[0]} = ${base}</text>
                    <text x="125" y="80" font-family="sans-serif" font-size="14" text-anchor="end">${letters[1]} = ${height}</text>
                </svg>
            `;
      return {
        topic: 'Flächen (Dreieck)',
        text: 'Berechne den Flächeninhalt $A$ des Dreiecks.',
        customHtml: html,
        answer: ans,
        unit: 'cm²'
      };
    }


    // --- APP LOGIK ---

    let currentQuestions = [];

    function generateWorksheet() {
      document.getElementById('final-score').classList.add('hidden');
      document.getElementById('btn-check-all').classList.remove('hidden');

      currentQuestions = [];

      // 4 Flächen-Aufgaben
      currentQuestions.push(genTrapez());
      currentQuestions.push(genDreieck());
      currentQuestions.push(genWand());
      currentQuestions.push(genKreis());

      // 4 Körper-Aufgaben
      currentQuestions.push(genQuader());
      currentQuestions.push(genZylinderRueck());
      currentQuestions.push(genKegelOderKugel());
      currentQuestions.push(genPyramideMantel());

      // Initialisiere hasChecked status
      currentQuestions.forEach(q => q.hasChecked = false);

      renderWorksheet();
    }

    function renderWorksheet() {
      const container = document.getElementById('worksheet-container');
      container.innerHTML = '';

      currentQuestions.forEach((q, index) => {
        // Konvertiere Markdown-Bold zu HTML
        let textHtml = q.text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

        // Konvertiere Inline-LaTeX
        textHtml = textHtml.replace(/\$(.*?)\$/g, (match, formula) => {
          try { return katex.renderToString(formula, { throwOnError: false }); }
          catch (e) { return match; }
        });

        const qDiv = document.createElement('div');
        qDiv.className = 'question-box bg-white p-5 rounded-xl border-2 border-gray-100 shadow-sm transition-colors print-break relative';
        qDiv.id = `question-div-${index}`;

        qDiv.innerHTML = `
                    <div class="flex gap-3 mb-3">
                        <div class="font-bold text-teal-600 text-xl w-6 shrink-0">${index + 1}.</div>
                        <div class="w-full">
                            <div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">${q.topic}</div>
                            <div class="text-gray-800 text-lg mb-2">${textHtml}</div>
                            
                            ${q.latex ? `<div id="math-${index}" class="math-container my-3 ml-2 text-teal-900"></div>` : ''}
                            ${q.customHtml ? q.customHtml : ''}
                            
                            <div class="mt-6 flex flex-wrap items-center gap-3">
                                <span class="font-bold text-gray-600">Lösung:</span>
                                <input type="number" step="0.01" id="input-${index}" class="border-2 border-gray-300 rounded-lg p-2 w-32 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none text-lg print-input" placeholder="Ergebnis">
                                ${q.unit ? `<span class="text-gray-600 font-medium">${q.unit}</span>` : ''}
                                
                                <button id="btn-single-${index}" onclick="checkSingleAnswer(${index})" class="ml-2 px-4 py-2 bg-teal-500 text-white rounded-lg hover:bg-teal-600 shadow transition-colors font-bold no-print whitespace-nowrap">Prüfen</button>
                                
                                <div id="feedback-${index}" class="ml-4 font-bold text-lg hidden no-print"></div>
                            </div>
                        </div>
                    </div>
                `;

        container.appendChild(qDiv);

        if (q.latex) {
          katex.render(q.latex, document.getElementById(`math-${index}`), {
            throwOnError: false, displayMode: true
          });
        }
      });
    }

    window.checkSingleAnswer = function (index) {
      const q = currentQuestions[index];
      const inputEl = document.getElementById(`input-${index}`);
      const feedbackEl = document.getElementById(`feedback-${index}`);
      const boxEl = document.getElementById(`question-div-${index}`);
      const btnEl = document.getElementById(`btn-single-${index}`);

      if (inputEl.value.trim() === '') {
        alert('Bitte trage zuerst ein Ergebnis für Aufgabe ' + (index + 1) + ' ein!');
        return;
      }

      // Ersetze Komma durch Punkt für deutsche Eingabe
      let userVal = parseFloat(inputEl.value.replace(',', '.'));

      // Toleranz-Logik: Erlaubt kleine Rundungsfehler bei Aufgaben mit Pi (Toleranz +/- 0.2)
      let diff = Math.abs(userVal - q.answer);
      let isCorrect = diff <= 0.2;

      q.hasChecked = true;
      inputEl.disabled = true;
      btnEl.classList.add('hidden');
      feedbackEl.classList.remove('hidden');

      if (isCorrect) {
        feedbackEl.innerHTML = '✓ Richtig' + (diff > 0.01 ? ` <span class="text-sm font-normal text-gray-500">(Exakt: ${q.answer})</span>` : '');
        feedbackEl.className = 'ml-4 font-bold text-lg text-green-600 no-print';
        boxEl.classList.add('border-green-300', 'bg-green-50');
        boxEl.classList.remove('border-gray-100');
      } else {
        feedbackEl.innerHTML = `✗ Falsch (Richtig wäre: ${q.answer})`;
        feedbackEl.className = 'ml-4 font-bold text-lg text-red-600 no-print';
        boxEl.classList.add('border-red-300', 'bg-red-50');
        boxEl.classList.remove('border-gray-100');
      }

      checkIfAllDone();
    }

    window.checkAllAnswers = function () {
      // Geht durch alle noch nicht geprüften Aufgaben und wertet sie aus
      currentQuestions.forEach((q, index) => {
        if (!q.hasChecked) {
          const inputEl = document.getElementById(`input-${index}`);
          if (inputEl.value.trim() === '') {
            inputEl.value = '0'; // Falls nichts eingetragen wurde, ist es automatisch falsch
          }
          checkSingleAnswer(index);
        }
      });
    }

    function checkIfAllDone() {
      const allChecked = currentQuestions.every(q => q.hasChecked);
      if (allChecked) {
        let score = currentQuestions.filter((q, idx) => {
          let userVal = parseFloat(document.getElementById(`input-${idx}`).value.replace(',', '.'));
          return Math.abs(userVal - q.answer) <= 0.2;
        }).length;

        const scoreEl = document.getElementById('final-score');
        scoreEl.innerHTML = `Du hast ${score} von ${currentQuestions.length} Aufgaben richtig gelöst!`;
        scoreEl.className = `text-2xl font-bold mt-4 text-center ${score === currentQuestions.length ? 'text-green-600' : 'text-teal-600'}`;
        scoreEl.classList.remove('hidden');

        document.getElementById('btn-check-all').classList.add('hidden');
      }
    }

    // --- Start ---
    document.addEventListener('DOMContentLoaded', () => {
      generateWorksheet();
    });
  </script>
</body>

</html>
